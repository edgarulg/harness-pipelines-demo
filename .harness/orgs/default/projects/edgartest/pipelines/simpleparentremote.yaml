    - stage:
        name: child-remote
        identifier: childremote
        description: ""
        type: Pipeline
        spec:
          org: default
          project: edgartest
          pipeline: simplechildremote
          gitBranch: main
          inputs:
            identifier: simplechildremote
            stages:
              - stage:
                  identifier: wait
                  type: Custom
                  spec:
                    execution:
                      steps:
                        - step:
                            identifier: Wait_1
                            type: Wait
                            spec:
                              duration: <+matrix.waits>
